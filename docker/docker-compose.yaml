services:
  # --- PostgreSQL ---
  # Stores both Airflow metadata and our pipeline data (raw/staging schemas)
  postgres:
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d bts_airline"]
      interval: 5s
      retries: 5
    env_file: ../.env
    volumes:
      - postgres-data:/var/lib/postgresql # data persists even if container is removed
    ports:
      - "5432:5432"
    networks:
      - pipeline-net
    restart: unless-stopped #if container stopped for any reasons, Docker will start it up automatically.
  # --- pgAdmin ---
  # Browser based UI to manage PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    env_file: ../.env
    ports:
      - "8085:80"
    networks:
      - pipeline-net
    restart: unless-stopped
    depends_on:
      - postgres
  # --- Airflow Init ---
  # Runs once: initializes the Airflow DB and creates the admin user
  # It stops after finishing - this is expected, not an error
  airflow-init:
    build: ./airflow # Airflow Dockerfile path
    env_file: ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false" # dont load example DAGs
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@admin.com
      "
    networks:
      - pipeline-net
    depends_on:
      postgres:
        condition: service_healthy
  # --- Airflow Webserver ---
  # Serves the Airflow UI at localhost:8080
  airflow-webserver:
    build: ./airflow
    env_file: ../.env
    hostname: airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: airflow webserver #automatically build command.
    ports:
      - "8080:8080"
    volumes:
      - ../ingestion/dags:/opt/airflow/dags # DAG files are read from local folder
      - ../ingestion:/opt/airflow/ingestion
      - ../data:/opt/airflow/data
      - ../infra/keys:/opt/airflow/keys # GCP key is mounted here, not copied into image
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock # allows Airflow to trigger docker run
    networks:
      - pipeline-net
    depends_on:
      - airflow-init
    restart: unless-stopped
  # --- Airflow Scheduler ---
  # Watches DAGs and triggers them on schedule — no UI, runs in background
  airflow-scheduler:
    build: ./airflow
    env_file: ../.env
    hostname: airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: airflow scheduler
    volumes:
      - ../ingestion/dags:/opt/airflow/dags
      - ../ingestion:/opt/airflow/ingestion
      - ../data:/opt/airflow/data
      - ../infra/keys:/opt/airflow/keys
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock # allows Airflow to trigger docker run
    networks:
      - pipeline-net
    depends_on:
      - airflow-init
    restart: unless-stopped
  # --- Spark ---
  # Runs spark-submit jobs triggered by Airflow via docker run
  # No command here — spark-submit is called from the Airflow DAG
  spark:
    build:
      context: ..          # repo root, so COPY processing/ works in Dockerfile
      dockerfile: docker/spark/Dockerfile
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /opt/spark/keys/bd-project-cemputer-credentials.json
    volumes:
      - ../infra/keys:/opt/spark/keys        # directory mount, not single file
      - ../processing:/opt/spark/processing  # live mount for development
      - ../data:/opt/spark/data
    ports:
      - "4040:4040" # Spark UI — only available while a job is running
    networks:
      - pipeline-net

# --- Streamlit ---
  # Serves the dashboard at localhost:8501
  streamlit:
    build:
      context: ..                              # repo root: Dockerfile needs both docker/ and analytics/
      dockerfile: docker/streamlit/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8501:8501"
    volumes:
      - ../infra/keys:/app/keys               # directory mount — avoids Docker single-file mount trap
    networks:
      - pipeline-net
    restart: unless-stopped

# Named volume — postgres data survives container restarts and removals
volumes:
  postgres-data:
  airflow-logs:

# All services talk to each other using service names (e.g. postgres:5432), not localhost
networks:
  pipeline-net: